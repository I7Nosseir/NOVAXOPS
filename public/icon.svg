<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1B3D38"/>
  <!-- NOVAX wordmark -->
  <text
    x="100" y="122"
    text-anchor="middle"
    font-family="'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="46"
    letter-spacing="2"
    fill="white"
  >NOVAX</text>
  <!-- Diagonal slash through the V — signature brand mark -->
  <line x1="148" y1="52" x2="124" y2="158" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- TM -->
  <text x="170" y="58" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="white" opacity="0.60">TM</text>
</svg>
